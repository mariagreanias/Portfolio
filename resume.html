<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maria S. Greanias - Resume</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,900;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #f5f0e8;
  --ink: #000000;
  --rust: #21a5d5;
}

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* BODY */
body {
  background-color: var(--cream);
  font-family: 'DM Mono', monospace;
}

/* CUSTOM CURSOR */
.cursor {
  position: fixed;
  width: 12px;
  height: 12px;
  background: var(--rust);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  transition: transform 0.1s ease, width 0.3s ease, height 0.3s ease;
}

.cursor-ring {
  position: fixed;
  width: 40px;
  height: 40px;
  border: 1px solid var(--rust);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9998;
  transform: translate(-50%, -50%);
  transition: transform 0.15s ease, width 0.3s ease, height 0.3s ease;
}

@media (pointer: fine) {
  body {
    cursor: none;
  }
}

/* NAVIGATION */
.main-nav {
  position: sticky;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 24px 48px;
  background: var(--cream);
  border-bottom: 1px solid rgba(0,0,0,0.06);
  z-index: 1000;
}

.nav-logo {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  font-weight: 900;
  text-decoration: none;
  color: var(--ink);
  letter-spacing: -0.02em;
}

.nav-right {
  display: flex;
  gap: 36px;
}

.nav-right a {
  font-size: 11px;
  letter-spacing: .2em;
  text-transform: uppercase;
  text-decoration: none;
  color: var(--ink);
  transition: color .3s ease;
}

.nav-right a:hover {
  color: var(--rust);
}

/* RESUME SECTION */

.resume-actions {
  margin-bottom: 20px;
  text-align: right;
}

.download-btn {
  font-size: 11px;
  letter-spacing: .2em;
  text-transform: uppercase;
  text-decoration: none;
  color: var(--ink);
  border: 1px solid var(--ink);
  padding: 10px 16px;
  transition: all .3s ease;
}

.download-btn:hover {
  background: var(--ink);
  color: var(--cream);
}

.resume-wrapper {
  padding: 120px 20px;
  display: flex;
  justify-content: center;
}

.resume-container {
  max-width: 900px;
  width: 100%;
  background: white;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  border-radius: 8px;
  padding: 20px;
}

.resume-container img {
  width: 100%;
  height: auto;
  display: block;
}
</style>
</head>



<body>

    <!-- Custom cursor -->
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<!-- NAV (moved into body where it belongs) -->
<nav class="main-nav">
  <a href="index.html" class="nav-logo">MG</a>

  <div class="nav-right">
    <a href="webdesign.html">Web Design</a>
    <a href="graphicdesign.html">Graphic Design</a>
    <a href="resume.html">Resume</a>
    <a href="aboutme.html">About</a>
  </div>
</nav>

<div class="resume-wrapper">
  <div class="resume-container">

    <div class="resume-actions">
      <a href="Greanias-Resume.jpg" download class="download-btn">
        Download PDF
      </a>
    </div>

    <img src="Greanias-Resume.jpg" alt="Maria S. Greanias Resume">

  </div>
</div>

<script>
  const cursor = document.getElementById('cursor');
  const cursorRing = document.getElementById('cursorRing');
  let mx = 0, my = 0, rx = 0, ry = 0;

  document.addEventListener('mousemove', e => {
    mx = e.clientX; 
    my = e.clientY;
    cursor.style.left = mx + 'px';
    cursor.style.top = my + 'px';
  });

  function animateRing() {
    rx += (mx - rx) * 0.12;
    ry += (my - ry) * 0.12;
    cursorRing.style.left = rx + 'px';
    cursorRing.style.top = ry + 'px';
    requestAnimationFrame(animateRing);
  }
  animateRing();

  document.querySelectorAll('a').forEach(el => {
    el.addEventListener('mouseenter', () => {
      cursor.style.width = '20px';
      cursor.style.height = '20px';
      cursorRing.style.width = '60px';
      cursorRing.style.height = '60px';
    });
    el.addEventListener('mouseleave', () => {
      cursor.style.width = '12px';
      cursor.style.height = '12px';
      cursorRing.style.width = '40px';
      cursorRing.style.height = '40px';
    });
  });
</script>

</body>
</html>
