    function handleGuess(number, btn) {
      if (!gameActive) return;

      guessCount++;
      btn.disabled = true;

      if (number === randomNumber) {
        btn.classList.add('correct');
        message.textContent = `🎉 Correct! You guessed it in ${guessCount} tries.`;
        gameActive = false;
        replayBtn.classList.remove('d-none');
      } else if (number < randomNumber) {
        btn.classList.add('too-low');
        message.textContent = '⬆️ Too low! Try a higher number.';
      } else {
        btn.classList.add('too-high');
        message.textContent = '⬇️ Too high! Try a lower number.';
      }

      guessCountDisplay.textContent = `Guesses so far: ${guessCount}`;
