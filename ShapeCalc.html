<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shape Calculator</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.container { margin: 50px auto; }

.shape-container {
    display: flex;
    justify-content: space-around;
    gap: 2rem;
}

section { padding: 0.5rem 0; }

h1 { margin: 1.5rem 0 1rem; }

p {
    font-size: 20px;
    min-width: 230px;
    min-height: 60px;
}

canvas {
    box-shadow: 2px 2px 6px rgba(0,0,0,0.35);
}

fieldset {
    border: 1px solid black;
    padding: 2rem;
}

legend {
    padding: 0 1rem;
}

button {
    height: 38px;
    margin-top: 14px;
}

input[type="range"] {
    width: 200px;
}
</style>
</head>

<body>
<div class="container">
<h1>Shape Calculator</h1>

<form name="options">
<fieldset class="shape-container">
<legend>Shape Basics</legend>

<section>
<label for="shape">Choose a Shape:</label>
<select id="shape" class="form-select">
<option value="circle" selected>Circle</option>
<option value="triangle">Triangle</option>
<option value="square">Square</option>
<option value="rectangle">Rectangle</option>
</select>
</section>

<section>
<div class="form-check"><input class="form-check-input" type="radio" name="color" value="red" checked> Red</div>
<div class="form-check"><input class="form-check-input" type="radio" name="color" value="orange"> Orange</div>
<div class="form-check"><input class="form-check-input" type="radio" name="color" value="yellow"> Yellow</div>
<div class="form-check"><input class="form-check-input" type="radio" name="color" value="green"> Green</div>
<div class="form-check"><input class="form-check-input" type="radio" name="color" value="blue"> Blue</div>
<div class="form-check"><input class="form-check-input" type="radio" name="color" value="purple"> Purple</div>
<div class="form-check"><input class="form-check-input" type="radio" name="color" value="black"> Black</div>
</section>

<section>
<div class="form-check">
<input class="form-check-input" type="checkbox" id="border">
<label class="form-check-label" for="border">Border</label>
</div>
</section>

</fieldset>
</form>

<form name="size">
<fieldset>
<legend>Shape Size</legend>

<div class="shape-container">

<section>
<canvas width="300" height="300"></canvas>
</section>

<section>
<label for="radius">Radius = 100px</label>
<input type="range" id="radius" value="100" min="0" max="150" class="form-range">

<label>Width / Base</label>
<input type="number" id="width" value="100" min="0" max="300" class="form-control">

<label>Height</label>
<input type="number" id="height" value="100" min="0" max="300" class="form-control">
</section>

</div>
</fieldset>
</form>

<form>
<fieldset>
<legend>Calculate Area or Perimeter</legend>
<div class="shape-container">
<button id="calculate" class="btn btn-primary">Calculate Size</button>
<p id="size">shape area: 0 px<br>shape perimeter: 0 px</p>
</div>
</fieldset>
</form>

</div>

<script>
'use strict';

const canvas = document.querySelector('canvas');
const ctx = canvas.getContext('2d');

let x = canvas.width / 2;
let y = canvas.height / 2;

let shapesForm = document.forms.options;
let sizeForm = document.forms.size;

window.addEventListener("load", () => {
    drawShape();
    calculateSize(new Event("load"));
    updateSizeInputs();
});

function updateSizeInputs() {
    let shape = shapesForm.shape.value;

    sizeForm.radius.disabled = false;
    sizeForm.width.disabled = false;
    sizeForm.height.disabled = false;

    if (shape === "circle") {
        sizeForm.width.disabled = true;
        sizeForm.height.disabled = true;
    } else if (shape === "square") {
        sizeForm.radius.disabled = true;
        sizeForm.height.disabled = true;
    } else {
        sizeForm.radius.disabled = true;
    }
}

shapesForm.addEventListener("change", () => {
    updateSizeInputs();
    drawShape();
});

sizeForm.addEventListener("input", drawShape);
document.getElementById("calculate").addEventListener("click", calculateSize);

function drawShape(e) {
    if (e) e.preventDefault();

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = shapesForm.color.value;
    ctx.strokeStyle = shapesForm.border.checked ? "black" : "transparent";
    ctx.lineWidth = shapesForm.border.checked ? 3 : 0;

    let shape = shapesForm.shape.value;
    let r = Number(sizeForm.radius.value);
    let w = Number(sizeForm.width.value);
    let h = Number(sizeForm.height.value);

    if (shape === "circle") {
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
    }

    if (shape === "square") {
        ctx.fillRect(x - w/2, y - w/2, w, w);
        ctx.strokeRect(x - w/2, y - w/2, w, w);
    }

    if (shape === "rectangle") {
        ctx.fillRect(x - w/2, y - h/2, w, h);
        ctx.strokeRect(x - w/2, y - h/2, w, h);
    }

    if (shape === "triangle") {
        ctx.beginPath();
        ctx.moveTo(x, y - h/2);
        ctx.lineTo(x - w/2, y + h/2);
        ctx.lineTo(x + w/2, y + h/2);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
    }
}

function calculateSize(e) {
    e.preventDefault();

    let shape = shapesForm.shape.value;
    let r = Number(sizeForm.radius.value);
    let w = Number(sizeForm.width.value);
    let h = Number(sizeForm.height.value);

    let area = 0;
    let perimeter = 0;

    if (shape === "circle") {
        area = Math.PI * r * r;
        perimeter = 2 * Math.PI * r;
    }

    if (shape === "square") {
        area = w * w;
        perimeter = 4 * w;
    }

    if (shape === "rectangle") {
        area = w * h;
        perimeter = 2 * (w + h);
    }

    if (shape === "triangle") {
        let side = Math.sqrt((w/2)**2 + h**2);
        area = 0.5 * w * h;
        perimeter = w + 2 * side;
    }

    document.getElementById("size").innerHTML =
        `shape area: ${area.toFixed(2)} px<sup>2</sup><br>
         shape perimeter: ${perimeter.toFixed(2)} px`;
}
</script>

</body>
</html>
