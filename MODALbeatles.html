<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson 9: Modal</title>

<style>
body { background: snow; }

.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1.5rem;
    padding: 2rem;
}

.card {
    background: white;
    padding: 1rem;
    border-radius: 6px;
    box-shadow: 1px 1px 2px rgba(0,0,0,.35);
    text-align: center;
    cursor: pointer;
}

.card:hover {
    background: rgb(254,217,223);
}

.card img { width:100%; }

.modal-outer {
    position: fixed;
    inset: 0;
    background: rgba(217,248,254,.7);
    display: grid;
    justify-content:center;
    align-items:center;
    opacity:0;
    pointer-events:none;
    transition:.2s;
}

.modal-outer.open {
    opacity:1;
    pointer-events:all;
}

.modal-inner {
    background:white;
    padding:2rem;
    border-radius:6px;
    max-width:600px;
}

.modal-desc {
    display:flex;
    gap:1rem;
}

.modal-img {
    width:150px;
}
</style>
</head>

<body>

<h1 style="text-align:center">Modal</h1>

<div class="cards">
    <div class="card" data-name="john">
        <img src="https://placecats.com/neo/200/200">
        <h2>John Lennon</h2>
    </div>
    <div class="card" data-name="paul">
        <img src="https://placecats.com/200/200">
        <h2>Paul McCartney</h2>
    </div>
    <div class="card" data-name="george">
        <img src="https://placecats.com/bella/200/200">
        <h2>George Harrison</h2>
    </div>
    <div class="card" data-name="ringo">
        <img src="https://placecats.com/millie/200/200">
        <h2>Ringo Starr</h2>
    </div>
</div>

<div class="modal-outer">
    <div class="modal-inner"></div>
</div>

<script>
'use strict';

const beatles = {
  john: {
    name: 'John Lennon',
    image: 'https://upload.wikimedia.org/wikipedia/commons/8/85/John_Lennon_1969_%28cropped%29.jpg',
    bio: `John Lennon was the founder and co-lead vocalist of The Beatles.
    Born October 9, 1940, he formed the band in Liverpool and became one of
    the most influential musicians in history. After the Beatles disbanded,
    he pursued a solo career and became known for his activism and
    peace campaigns with Yoko Ono.`
  },

  paul: {
    name: 'Paul McCartney',
    image: 'https://upload.wikimedia.org/wikipedia/commons/0/00/Paul_McCartney_Headshot_%28cropped%29.jpg',
    bio: `Paul McCartney was the bassist and co-lead vocalist of The Beatles.
    His songwriting partnership with John Lennon remains the most successful
    in music history. After the Beatles, he formed Wings and continues
    performing worldwide.`
  },

  george: {
    name: 'George Harrison',
    image: 'https://upload.wikimedia.org/wikipedia/commons/4/42/George_Harrison_1974.jpg',
    bio: `George Harrison was the lead guitarist of The Beatles.
    Known as the "quiet Beatle," he introduced Indian music influences
    into the band’s sound. His songs include "Here Comes the Sun"
    and "Something."`
  },

  ringo: {
    name: 'Ringo Starr',
    image: 'https://upload.wikimedia.org/wikipedia/commons/3/32/Ringo_1963_%28cropped%29.jpg',
    bio: `Ringo Starr was the drummer for The Beatles.
    He occasionally sang lead vocals and wrote songs such as
    "Octopus's Garden." He continues to tour and record music today.`
  }
};

const cards = document.querySelectorAll('.card');
const modalOuter = document.querySelector('.modal-outer');
const modalInner = document.querySelector('.modal-inner');

function openModal(e){
    const card = e.currentTarget;
    const data = beatles[card.dataset.name];

    modalInner.innerHTML = `
    <h2>${data.name}</h2>
    <div class="modal-desc">
        <img class="modal-img" src="${data.image}" alt="${data.name}">
        <div>
            <p>${data.bio}</p>
        </div>
    </div>
`;

    modalOuter.classList.add('open');
}

function closeModal(e){
    if(!e.target.closest('.modal-inner')){
        modalOuter.classList.remove('open');
    }
}

cards.forEach(card=>card.addEventListener('click',openModal));
modalOuter.addEventListener('click',closeModal);

window.addEventListener('keydown',(e)=>{
    if(e.key==='Escape'){
        modalOuter.classList.remove('open');
    }
});
</script>

</body>
</html>
